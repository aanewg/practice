    .site-target { color: #cc0000; font-weight: bold; }

    .site-walmart { color: #0071ce; font-weight: bold; }

    function buildPricedUrl(site, price) {
      const num = parseFloat(price.replace(/[$,]/g, ""));
      const min = Math.floor(num);
      const max = Math.ceil(num);
      if (site === "Target") {
        return `https://www.target.com/s?searchTerm=dyson+vacuum&minPrice=${min}&maxPrice=${max}`;
      } else if (site === "eBay") {
        return `https://www.ebay.com/sch/i.html?_nkw=dyson+vacuum&_udlo=${min}&_udhi=${max}`;
      } else if (site === "Best Buy") {
        return `https://www.bestbuy.com/site/searchpage.jsp?st=dyson+vacuum&price=${min}-${max}`;
      } else if (site === "Walmart") {
        return `https://www.walmart.com/search?q=dyson+vacuum&minPrice=${min}&maxPrice=${max}`;
      }
      return `https://www.google.com/search?q=dyson+vacuum+${encodeURIComponent(price)}`;
    }

    function render() {
      const site = document.getElementById("siteFilter").value;
      const sort = document.getElementById("sortFilter").value;

      let filtered = site === "all" ? [...data] : data.filter(d => d.site === site);

      if (sort === "asc") filtered.sort((a, b) => parseFloat(a.price.replace(/[$,]/g, "")) - parseFloat(b.price.replace(/[$,]/g, "")));
      else if (sort === "desc") filtered.sort((a, b) => parseFloat(b.price.replace(/[$,]/g, "")) - parseFloat(a.price.replace(/[$,]/g, "")));
      else filtered.sort((a, b) => a.site.localeCompare(b.site));

      const body = document.getElementById("tableBody");
      body.innerHTML = filtered.map(item => `
        <tr>
          <td class="site-${item.site.toLowerCase().replace(" ", "")}">${item.site}</td>
          <td class="price">${item.price}</td>
          <td><a href="${buildPricedUrl(item.site, item.price)}" target="_blank">View →</a></td>
          <td>${new Date(item.timestamp).toLocaleString()}</td>
        </tr>
      `).join("");

      document.getElementById("status").textContent = `Showing ${filtered.length} prices`;
    }
  </script>
